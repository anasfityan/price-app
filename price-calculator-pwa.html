<style>
:root{
  --gold:#c9a84c;--gold-light:#e8c96a;--gold-dim:rgba(201,168,76,0.15);
  --dark:#0a0a0a;--dark2:#131313;--dark3:#1a1a1a;--dark4:#242424;--dark5:#2e2e2e;
  --text:#f0ece0;--muted:#6a6258;--muted2:#8a8070;
  --green:#4caf7d;--red:#e05c5c;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Tajawal',sans-serif;background:var(--dark);color:var(--text);
  height:100vh;display:flex;flex-direction:column;
}

/* TOP BAR - ثابت */
.topbar{
  flex-shrink:0;
  background:var(--dark2);border-bottom:1px solid rgba(201,168,76,0.1);
  padding:12px 18px;display:flex;align-items:center;justify-content:space-between;
  z-index:100;
}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-logo{width:34px;height:34px;border-radius:9px;object-fit:cover;border:1.5px solid rgba(201,168,76,0.3);}
.topbar-title{font-size:16px;font-weight:800;}
.topbar-title span{color:var(--gold);}
.menu-btn{
  background:var(--dark3);border:1px solid var(--dark5);
  border-radius:9px;padding:7px 9px;cursor:pointer;
  display:flex;flex-direction:column;gap:4px;
}
.menu-btn span{display:block;width:16px;height:2px;background:var(--muted2);border-radius:2px;}

/* RATE TICKER - ثابت */
.rate-ticker{
  flex-shrink:0;
  background:var(--dark3);border-bottom:1px solid var(--dark4);
  padding:7px 18px;display:flex;align-items:center;gap:8px;font-size:12px;
}
.ticker-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.ticker-label{color:var(--muted);}
.ticker-val{color:var(--gold);font-weight:700;direction:ltr;}
.ticker-divider{width:1px;height:12px;background:var(--dark5);}
.ticker-change{font-size:11px;}
.ticker-change.up{color:var(--green);}
.ticker-change.dn{color:var(--red);}

/* RESULT - ثابت تحت التيكر */
.result-fixed{
  flex-shrink:0;
  background:linear-gradient(135deg,rgba(201,168,76,0.1),rgba(201,168,76,0.03));
  border-bottom:1.5px solid rgba(201,168,76,0.2);
  padding:14px 18px;display:flex;align-items:center;justify-content:space-between;
  min-height:72px;
}
.result-fixed .hint{font-size:13px;color:var(--muted);width:100%;text-align:center;}
.result-fixed .res-label{font-size:11px;letter-spacing:1.5px;color:var(--muted2);text-transform:uppercase;margin-bottom:2px;}
.result-fixed .res-amount{
  font-size:38px;font-weight:900;direction:ltr;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1;
}
.result-fixed .res-cur{font-size:12px;color:var(--muted2);}
.result-fixed .res-right{text-align:right;}
.result-fixed .res-profit{
  font-size:12px;color:var(--muted);
  background:rgba(0,0,0,0.25);border-radius:8px;
  padding:6px 12px;text-align:center;
}
.result-fixed .res-profit b{color:var(--green);}

/* SCROLL AREA */
.scroll-area{
  flex:1;overflow-y:auto;padding:16px 16px 30px;
  display:flex;flex-direction:column;gap:12px;
}

/* INPUT CARD */
.input-card{
  background:var(--dark2);border:1px solid var(--gold-dim);
  border-radius:20px;padding:22px 18px;
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
.input-card-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);font-weight:600;align-self:flex-start;}

.lira-box{
  width:100%;background:var(--dark3);
  border:2px solid var(--dark5);border-radius:16px;
  display:flex;align-items:center;padding:0 18px;
  transition:border-color .25s;
}
.lira-box:focus-within{border-color:var(--gold);}
.lira-box input{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:'Tajawal',sans-serif;
  font-size:40px;font-weight:900;
  padding:16px 0;text-align:center;direction:ltr;width:0;
}
.lira-box input::placeholder{color:var(--dark5);font-size:32px;}
.lira-sym{font-size:24px;color:var(--gold);font-weight:700;opacity:.6;}

/* HISTORY */
.hist-card{background:var(--dark2);border:1px solid rgba(255,255,255,.05);border-radius:18px;padding:14px;}
.hist-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.hist-title{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;}
.clrbtn{background:none;border:none;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;text-decoration:underline;}
.hist-list{display:flex;flex-direction:column;gap:6px;}
.hempty{color:var(--muted);font-size:13px;text-align:center;padding:6px 0;}
.hitem{
  display:flex;justify-content:space-between;align-items:center;
  background:var(--dark3);border-radius:9px;padding:9px 12px;cursor:pointer;
}
.hitem .hl{font-size:13px;color:var(--muted2);}
.hitem .hl b{color:var(--text);}
.hitem .hd{color:var(--gold);font-weight:800;font-size:14px;direction:ltr;}

/* DRAWER */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px);}
.overlay.open{opacity:1;pointer-events:all;}
.drawer{
  position:fixed;top:0;left:0;width:82%;max-width:300px;height:100%;
  background:var(--dark2);z-index:300;
  transform:translateX(-100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow-y:auto;
  border-right:1px solid rgba(201,168,76,0.12);
}
.drawer.open{transform:translateX(0);}
.drawer-header{padding:22px 18px 14px;border-bottom:1px solid var(--dark4);display:flex;align-items:center;gap:12px;}
.drawer-header img{width:38px;height:38px;border-radius:9px;object-fit:cover;}
.drawer-header h2{font-size:15px;font-weight:800;}
.drawer-header p{font-size:11px;color:var(--muted);margin-top:2px;}
.drawer-close{margin-right:auto;background:var(--dark3);border:1px solid var(--dark5);border-radius:8px;padding:5px 9px;cursor:pointer;color:var(--muted2);font-size:13px;}
.drawer-section{padding:18px 16px;}
.drawer-section-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--dark4);}
.drawer-field{margin-bottom:12px;}
.drawer-field label{font-size:12px;color:var(--muted2);display:block;margin-bottom:5px;}
.diw{display:flex;align-items:center;background:var(--dark3);border:1.5px solid var(--dark4);border-radius:10px;overflow:hidden;transition:border-color .2s;}
.diw:focus-within{border-color:var(--gold);}
.diw input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Tajawal',sans-serif;font-size:18px;font-weight:700;padding:11px 12px;text-align:right;direction:ltr;width:0;}
.diw .dunit{padding:0 10px;font-size:11px;font-weight:700;color:var(--gold);border-right:1px solid var(--dark4);white-space:nowrap;}
</style>
</head>

  if(lira<=TABLE[0][0])return TABLE[0][1];
  if(lira>=TABLE[TABLE.length-1][0]){const n=TABLE.length,[l1,d1]=TABLE[n-2],[l2,d2]=TABLE[n-1];return d2+(lira-l2)*(d2-d1)/(l2-l1);}
  for(let i=0;i<TABLE.length-1;i++){const[l1,d1]=TABLE[i],[l2,d2]=TABLE[i+1];if(lira>=l1&&lira<=l2)return d1+(lira-l1)/(l2-l1)*(d2-d1);}
  return 0;
}

function calc(){
  const lira=parseFloat(document.getElementById('liraVal').value);
  const box=document.getElementById('resultFixed');
  if(!lira||lira<=0){box.innerHTML='<div class="hint">أدخل السعر بالليرة أدناه</div>';return;}
  const usdIqd=parseFloat(document.getElementById('usdIqd').value)||BASE_IQD;
  const usdTry=parseFloat(document.getElementById('usdTry').value)||BASE_TRY;
  const base=lookup(lira);
  const ratio=(usdIqd/usdTry)/(BASE_IQD/BASE_TRY);
  // تقريب لأقرب 500 دائماً
  const final=Math.round(base*ratio/500)*500;
  const rawCost=lira*(usdIqd/usdTry);
  const profit=final-rawCost;
  const pct=((profit/rawCost)*100).toFixed(0);
  box.innerHTML=
    '<div class="res-right"><div class="res-label">سعر البيع</div><div class="res-amount">'+final.toLocaleString()+'</div><div class="res-cur">دينار عراقي</div></div>'+
    '<div class="res-profit">ربح<br><b>'+Math.round(profit).toLocaleString()+'</b><br><span style="font-size:11px;color:var(--muted)">'+pct+'%</span></div>';
  addHist(lira,final);
}

function addHist(l,d){
  if(history.length&&history[0].l===l&&history[0].d===d)return;
  history.unshift({l,d});if(history.length>8)history.pop();renderHist();
}
function renderHist(){
  const el=document.getElementById('histList');
  if(!history.length){el.innerHTML='<div class="hempty">لا يوجد حسابات بعد</div>';return;}
  el.innerHTML=history.map(h=>'<div class="hitem" onclick="fillHist('+h.l+')"><div class="hl"><b>'+h.l.toLocaleString()+'</b> ليرة</div><div class="hd">'+h.d.toLocaleString()+' د.ع</div></div>').join('');
}
function fillHist(l){document.getElementById('liraVal').value=l;calc();}
function clearHist(){history=[];renderHist();}

async function fetchRate(){
  try{
    const r=await fetch('https://open.er-api.com/v6/latest/USD');
    const d=await r.json();
    const tryRate=d.rates.TRY;
    document.getElementById('tickerRate').textContent=tryRate.toFixed(2)+' ₺';
    document.getElementById('tickerChange').textContent='مباشر ✓';
    document.getElementById('tickerChange').className='ticker-change up';
    document.getElementById('usdTry').value=tryRate.toFixed(2);
    calc();
  }catch(e){
    document.getElementById('tickerChange').textContent='غير متاح';
    document.getElementById('tickerChange').className='ticker-change dn';
  }
}
fetchRate();
setInterval(fetchRate,60000);

if('serviceWorker' in navigator){
  const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>clients.claim());self.addEventListener('fetch',e=>e.respondWith(caches.open('pca-v3').then(c=>c.match(e.request).then(r=>r||fetch(e.request).then(res=>{c.put(e.request,res.clone());return res;})))));`;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
